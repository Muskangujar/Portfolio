<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Muskangujar Portfolio</title>
    <!-- Redirect to Vercel immediately -->
    <meta http-equiv="refresh" content="0; url=https://muskangujar.vercel.app">
    <script type="text/javascript">
        window.location.href = "https://muskangujar.vercel.app";
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #333;
            border-bottom-color: #0070f3;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        p {
            color: #888;
            font-size: 0.9rem;
        }
        a {
            color: #0070f3;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Moving to our new home</h1>
        <p>Redirecting you to <a href="https://muskangujar.vercel.app">muskangujar.vercel.app</a></p>
        <p>If you are not redirected automatically, please click the link above.</p>
    </div>
</body>
</html>
